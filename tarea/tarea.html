<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>Tarea</title>
    <link rel="stylesheet" href="tarea.css">
    <script src="tarea.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">


</head>
<body>
    <section class="main border flex flex-row">

        <div class="div-colores border flex flex-col gap1">
            <button class="caja-color border bg-red" type="button"></button>
            <button class="caja-color border bg-pink" type="button"></button>
            <button class="caja-color border bg-purple" type="button"></button>
            <button class="caja-color border bg-blue" type="button"></button>
            <button class="caja-color border bg-orange" type="button"></button>
            <button class="caja-color border bg-green" type="button"></button>
        </div>
        <div class="div-formulario border flex flex-col gap10 align-items-center jc-center">
            <button class="editable-button text-font" id="editable-button" type="button">Editame</button>
            <input type="text" id="input-box">
            <button class="submit-button text-font" id="submit-button" type="submit">Submit</button>
        </div>
    </section>
    
</body>
</html>
